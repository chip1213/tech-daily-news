name: 每日新聞更新

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 08:00 台灣時間 (UTC+8 = UTC 00:00)
    - cron: '0 4 * * *'   # 每天 12:00 台灣時間
    - cron: '0 12 * * *'  # 每天 20:00 台灣時間
  workflow_dispatch:       # 允許手動觸發

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Fetch latest news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/fetch-news.js

      - name: Commit and push news.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "chore: 更新新聞 $(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')"
          git push
