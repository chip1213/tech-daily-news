<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技脈動 Daily · AI & 低軌衛星</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d0f14; --surface: #161820; --surface2: #1e2029;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0; --muted: #7a7f94;
    --accent-ai: #a78bfa; --accent-sat: #f59e0b;
    --accent-tw: #3b82f6; --accent-int: #10b981;
    --serif: 'Noto Serif TC', serif; --sans: 'Noto Sans TC', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header { padding: 2rem 2.5rem 1.25rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
  .header-left h1 { font-family: var(--serif); font-size: 1.7rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
  .header-left h1 span { color: var(--accent-ai); }
  .header-left .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 0.3rem; font-weight: 300; letter-spacing: 0.04em; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; }
  .date-badge { font-size: 0.75rem; color: var(--muted); background: var(--surface2); border: 0.5px solid var(--border2); padding: 0.35rem 0.9rem; border-radius: 99px; }
  .update-time { font-size: 0.7rem; color: var(--muted); opacity: 0.65; }

  .schedule-bar { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0.5rem 2.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .sched-item { display: flex; align-items: center; gap: 0.45rem; font-size: 0.72rem; color: var(--muted); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-int); }
  .live-dot.fresh { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .tabs { display: flex; padding: 0 2.5rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 0.82rem; font-weight: 500; padding: 0.9rem 1.2rem; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
  .tab-btn.active { color: #fff; border-bottom-color: var(--accent-ai); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .dot-tw { background: var(--accent-tw); } .dot-int { background: var(--accent-int); }

  main { padding: 1.75rem 2.5rem 3rem; }
  .section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; margin-top: 0.25rem; }
  .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .section-line { flex: 1; height: 0.5px; background: var(--border); }

  .news-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 2.25rem; }
  .news-card { background: var(--surface); padding: 1.25rem 1.4rem; transition: background 0.2s; }
  .news-card:hover { background: var(--surface2); }
  .card-meta { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.65rem; flex-wrap: wrap; }
  .tag { font-size: 0.67rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.2rem 0.55rem; border-radius: 4px; text-transform: uppercase; }
  .tag-ai  { background: rgba(167,139,250,0.15); color: var(--accent-ai); }
  .tag-sat { background: rgba(245,158,11,0.15);  color: var(--accent-sat); }
  .tag-tw  { background: rgba(59,130,246,0.12);  color: var(--accent-tw); }
  .tag-int { background: rgba(16,185,129,0.12);  color: var(--accent-int); }
  .card-num { font-size: 0.7rem; color: var(--muted); font-weight: 300; margin-left: auto; }
  .news-card h3 { font-family: var(--serif); font-size: 0.95rem; font-weight: 600; line-height: 1.6; color: #e8eaf0; margin-bottom: 0.5rem; }
  .news-card p  { font-size: 0.79rem; color: var(--muted); line-height: 1.65; font-weight: 300; }

  .state-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 1rem; }
  .spinner { width: 34px; height: 34px; border: 2px solid var(--border2); border-top-color: var(--accent-ai); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-text { font-size: 0.85rem; color: var(--muted); }
  .state-sub  { font-size: 0.75rem; color: var(--muted); opacity: 0.6; }

  .error-box { background: rgba(239,68,68,0.07); border: 0.5px solid rgba(239,68,68,0.22); border-radius: 10px; padding: 1.75rem; text-align: center; color: #f87171; font-size: 0.85rem; line-height: 1.8; max-width: 440px; }
  .error-box code { font-size: 0.72rem; opacity: 0.6; display: block; margin-top: 0.5rem; }

  footer { padding: 1.25rem 2.5rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.75rem; }
  .footer-note { font-size: 0.72rem; color: var(--muted); font-weight: 300; }
  .btn { background: var(--surface2); border: 0.5px solid var(--border2); color: var(--text); font-family: var(--sans); font-size: 0.78rem; padding: 0.45rem 1.1rem; border-radius: 99px; cursor: pointer; transition: background 0.2s; text-decoration: none; display: inline-block; }
  .btn:hover { background: #2a2d3a; }

  #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 0.5px solid rgba(167,139,250,0.35); color: var(--text); font-family: var(--sans); font-size: 0.8rem; padding: 0.65rem 1.4rem; border-radius: 99px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>科技脈動 <span>Daily</span></h1>
    <div class="subtitle">AI 產業 &amp; 低軌衛星 · 每日 08:00 / 12:00 / 20:00 自動更新</div>
  </div>
  <div class="header-right">
    <div class="date-badge" id="date-badge">—</div>
    <div class="update-time" id="update-time"></div>
  </div>
</header>

<div class="schedule-bar">
  <div class="sched-item">
    <div class="live-dot" id="live-dot"></div>
    <span id="data-status">讀取中...</span>
  </div>
  <div class="sched-item">資料日期：<span id="data-date">—</span></div>
  <div class="sched-item">下次更新：<span id="next-update">—</span></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('all')">全部</button>
  <button class="tab-btn" onclick="setTab('tw')"><span class="dot dot-tw"></span>台灣</button>
  <button class="tab-btn" onclick="setTab('int')"><span class="dot dot-int"></span>國際</button>
  <button class="tab-btn" onclick="setTab('ai')">AI 產業</button>
  <button class="tab-btn" onclick="setTab('sat')">低軌衛星</button>
</div>

<main id="main-content">
  <div class="state-wrap">
    <div class="spinner"></div>
    <div class="state-text">載入新聞資料中...</div>
  </div>
</main>

<footer>
  <div class="footer-note">由 GitHub Actions 每日自動抓取 · Claude AI 整理 · 資料來源：公開新聞媒體</div>
  <button class="btn" onclick="loadNews()">↻ 重新讀取</button>
</footer>

<div id="toast"></div>

<script>
let allNews = [];
let currentTab = 'all';

function getNextUpdate() {
  const now = new Date();
  const h = now.getHours() * 60 + now.getMinutes();
  for (const t of [480, 720, 1200]) {
    if (t > h) return `${String(t/60|0).padStart(2,'0')}:00`;
  }
  return '明日 08:00';
}

function fmtTime(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('zh-TW', {
    timeZone: 'Asia/Taipei', month: 'numeric', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function isToday(iso) {
  if (!iso) return false;
  const d = new Date(iso);
  const n = new Date();
  return d.getFullYear() === n.getFullYear() &&
         d.getMonth()    === n.getMonth()    &&
         d.getDate()     === n.getDate();
}

async function loadNews() {
  try {
    const res  = await fetch(`news.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    document.getElementById('date-badge').textContent = new Date().toLocaleDateString('zh-TW', {
      year:'numeric', month:'long', day:'numeric', weekday:'long'
    });
    document.getElementById('next-update').textContent = getNextUpdate();

    if (!data.news || data.news.length === 0) {
      document.getElementById('data-status').textContent = '尚無資料（排程尚未執行）';
      document.getElementById('main-content').innerHTML = `
        <div class="state-wrap">
          <div class="error-box">
            新聞資料尚未產生<br>
            請先到 GitHub Actions 手動執行一次 workflow，<br>或等待排程自動執行（08:00 / 12:00 / 20:00 台灣時間）
            <code>Actions → 每日新聞更新 → Run workflow</code>
          </div>
        </div>`;
      return;
    }

    allNews = data.news;
    const fresh = isToday(data.fetchedAt);
    const dot = document.getElementById('live-dot');
    dot.classList.toggle('fresh', fresh);
    document.getElementById('data-status').textContent = fresh ? '今日資料 ✓' : '非今日資料（等待排程更新）';
    document.getElementById('data-date').textContent   = fmtTime(data.fetchedAt);
    document.getElementById('update-time').textContent = '上次更新：' + fmtTime(data.fetchedAt);

    renderNews();
  } catch (e) {
    document.getElementById('main-content').innerHTML = `
      <div class="state-wrap">
        <div class="error-box">
          無法讀取 news.json<br>
          請確認檔案存在於 repo 根目錄
          <code>${e.message}</code>
        </div>
      </div>`;
  }
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', ['all','tw','int','ai','sat'][i] === tab);
  });
  renderNews();
}

function renderNews() {
  const f  = currentTab === 'all' ? allNews : allNews.filter(n => n.region === currentTab || n.topic === currentTab);
  const tw  = f.filter(n => n.region === 'tw');
  const int = f.filter(n => n.region === 'int');
  let html = '';
  if (tw.length)  html += section('台灣', 'tw',  tw);
  if (int.length) html += section('國際', 'int', int);
  if (!html) html = '<div class="state-wrap"><div class="state-text">此分類暫無資料</div></div>';
  document.getElementById('main-content').innerHTML = html;
}

function section(label, region, items) {
  return `<div class="section-header">
    <span class="dot dot-${region}"></span>
    <span class="section-label">${label}</span>
    <div class="section-line"></div>
  </div>
  <div class="news-grid">${items.map((n,i) => card(n, i+1)).join('')}</div>`;
}

function card(n, num) {
  const tCls = n.topic === 'ai' ? 'tag-ai' : 'tag-sat';
  const tLbl = n.topic === 'ai' ? 'AI 產業' : '低軌衛星';
  const rCls = n.region === 'tw' ? 'tag-tw' : 'tag-int';
  const rLbl = n.region === 'tw' ? '🇹🇼 台灣' : '🌍 國際';
  return `<div class="news-card">
    <div class="card-meta">
      <span class="tag ${tCls}">${tLbl}</span>
      <span class="tag ${rCls}">${rLbl}</span>
      <span class="card-num">#${String(num).padStart(2,'0')}</span>
    </div>
    <h3>${n.title}</h3>
    <p>${n.summary}</p>
  </div>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity = '0', 3000);
}

loadNews();
setInterval(loadNews, 5 * 60 * 1000); // 每 5 分鐘重讀一次
</script>
</body>
</html>
